<html lang="zh-TW">

    <style>
        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #f0f9ff;
            background-image: radial-gradient(#e0f2fe 4px, transparent 4px);
            background-size: 36px 36px;
            color: #0c4a6e;
            overflow-x: hidden;
        }
        .cute-card {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            box-shadow: 0 12px 35px rgba(14,165,233,0.2);
            border: 4px solid #ffffff;
        }
        .cute-btn {
            background: linear-gradient(135deg, #0ea5e9 0%, #3b82f6 100%);
            color: #ffffff;
            font-weight: 700;
            border-radius: 999px;
            box-shadow: 0 8px 20px rgba(14,165,233,0.4);
            transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
            border: 3px solid #ffffff;
        }
        .cute-btn:hover { transform: translateY(-4px) scale(1.02); box-shadow: 0 12px 25px rgba(14,165,233,0.6); }
        .cute-btn:active { transform: translateY(2px); }
        .cute-btn-disabled { background:#f1f5f9; color:#94a3b8; box-shadow:none; cursor:not-allowed; border-color:#e2e8f0; transform:none !important; }
        .cute-input { border:3px solid #e0f2fe; border-radius:16px; padding:14px; transition:all 0.3s; background:#fff; }
        .cute-input:focus { outline:none; border-color:#38bdf8; box-shadow:0 0 0 5px rgba(56,189,248,0.3); }
        .player-item { transition:all 0.2s cubic-bezier(0.4,0,0.2,1); border:2px solid transparent; }
        .player-item.selected { background:#e0f2fe; border-color:#7dd3fc; color:#0369a1; transform:scale(1.03); box-shadow:0 6px 15px rgba(14,165,233,0.2); }
        .player-item.disabled { opacity:0.5; cursor:not-allowed; background:transparent; }
        .player-item:not(.selected):not(.disabled):hover { background:#f0f9ff; border-color:#bae6fd; transform:translateX(6px); }
        .match-card { background:white; border:4px solid #e0f2fe; border-radius:24px; box-shadow:0 8px 20px rgba(14,165,233,0.15); transition:transform 0.2s, box-shadow 0.2s; z-index:10; }
        .match-card:hover { transform:translateY(-4px) scale(1.02); box-shadow:0 12px 30px rgba(14,165,233,0.3); border-color:#bae6fd; }
        .match-player { transition:background-color 0.2s, color 0.2s; cursor:pointer; }
        .match-player.winner { background-color:#e0f2fe; color:#0369a1; }
        .match-player.loser { opacity:0.4; text-decoration:line-through; background-color:#f8fafc; }
        .match-player:hover:not(.winner):not(.empty) { background-color:#f0f9ff; }
        .pop-in { animation:popIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275) forwards; opacity:0; transform:scale(0.9) translateY(10px); }
        @keyframes popIn { to { opacity:1; transform:scale(1) translateY(0); } }
        .custom-scrollbar::-webkit-scrollbar { width:8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background:#f0f9ff; border-radius:10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background:#7dd3fc; border-radius:10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background:#38bdf8; }
        .champion-crowned { transform:scale(1.2) translateY(-5px); z-index:50 !important; border-color:#fcd34d !important; background:linear-gradient(135deg,#fffbeb 0%,#fef3c7 100%) !important; box-shadow:0 20px 40px rgba(251,191,36,0.4),0 0 30px rgba(251,191,36,0.6) !important; animation:popCrown 0.6s cubic-bezier(0.175,0.885,0.32,1.275) forwards, glowCrown 2s infinite alternate !important; }
        .champion-crowned-text { color:#b45309 !important; }
        .champion-crowned-icon { animation:bounceEmoji 1s infinite alternate; }
        @keyframes popCrown { 0%{transform:scale(1) translateY(0);} 50%{transform:scale(1.3) translateY(-10px);} 100%{transform:scale(1.2) translateY(-5px);} }
        @keyframes glowCrown { from{box-shadow:0 15px 35px rgba(251,191,36,0.4),0 0 20px rgba(251,191,36,0.3);} to{box-shadow:0 25px 45px rgba(251,191,36,0.6),0 0 50px rgba(251,191,36,0.8);} }
        @keyframes bounceEmoji { from{transform:translateY(0);} to{transform:translateY(-10px);} }
    </style>
</head>

const STORAGE_KEY = 'dreamy_tournament_participants_v4';
let isDefaultList = false;
function loadParticipants() {
    try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) { isDefaultList = false; return JSON.parse(saved); }
    } catch(e) {}
    isDefaultList = true;
    return [];
}
function saveParticipants() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state.participants));
}

    stage: 'setup',
    participants: loadParticipants(),
    numGroups: 8,
    qualifiersPerGroup: 1,

const appContainer = document.getElementById('app-container');

function init() {
    render();
    appContainer.addEventListener('click', handleGlobalClick);
    window.addEventListener('resize', () => {
        if (state.stage === 'bracket') { drawBracketLines(); fitBracket(); }
    });
}

function handleGlobalClick(e) {
    const target = e.target.closest('[data-action]');
    if (!target) return;
    const action = target.dataset.action;
    if (action === 'generate-groups') {
        handleGenerateGroups();
    } else if (action === 'toggle-qualifier') {
        if (state.isRolling) return;
        toggleQualifier(parseInt(target.dataset.gidx), target.dataset.name);
    } else if (action === 'generate-bracket') {
        handleGenerateBracket();
    } else if (action === 'set-winner') {
        if (state.isBracketRolling) return;
        handleMatchWinnerClick(parseInt(target.dataset.ridx), parseInt(target.dataset.midx), parseInt(target.dataset.player));
    } else if (action === 'reset') {
        resetApp();
    } else if (action === 'add-by-dropdown') {
        handleAddByDropdown();
    } else if (action === 'add-custom') {
        handleAddCustom();
    } else if (action === 'remove-participant') {
        isDefaultList = false;
        state.participants.splice(parseInt(target.dataset.idx), 1);
        saveParticipants();
        render(true);
    } else if (action === 'clear-participants') {
        if (confirm('確定要清空所有的參賽者名單嗎？ 🥺')) {
            isDefaultList = false;
            state.participants = [];
            saveParticipants();
            render(true);
        }
    }
}

function updateNav() {
    const s1 = document.getElementById('nav-step-1');
    const s2 = document.getElementById('nav-step-2');
    const s3 = document.getElementById('nav-step-3');
    if (!s1) return;
    s1.className = s2.className = s3.className = 'text-sky-300';
    if (state.stage === 'setup')   s1.className = 'text-sky-600 transition-colors transform scale-105';
    if (state.stage === 'groups')  s2.className = 'text-sky-600 transition-colors transform scale-105';
    if (state.stage === 'bracket') s3.className = 'text-sky-600 transition-colors transform scale-105';
}

function handleAddByDropdown() {
    const sel = document.getElementById('select-class-add');
    if (!sel) return;
    const val = sel.value;
    if (!val || val === '__placeholder__') return;

    let newNames = [];
    if (GRADE_MAP[val]) {
        // 年級 P1-P6
        GRADE_MAP[val].forEach(cls => {
            (STUDENT_DB[cls] || []).forEach(([name]) => {
                newNames.push(`${cls} ${name}`);
            });
        });
    } else if (STUDENT_DB[val]) {
        // 單一班別：顯示「學號 姓名」
        STUDENT_DB[val].forEach(([name, num]) => {
            newNames.push(`${num} ${name}`);
        });
    }

    if (newNames.length > 0) {
        if (isDefaultList) {
            state.participants = newNames;
            isDefaultList = false;
        } else {
            state.participants = [...state.participants, ...newNames];
        }
        saveParticipants();
        render(true);
    }
}

function handleAddCustom() {
    const ta = document.getElementById('input-custom-participants');
    if (!ta || !ta.value.trim()) return;
    const newNames = ta.value.split('\n').map(n => n.trim()).filter(n => n !== '');
    if (newNames.length > 0) {
        if (isDefaultList) {
            state.participants = newNames;
            isDefaultList = false;
        } else {
            state.participants = [...state.participants, ...newNames];
        }
        saveParticipants();
        render(true);
        setTimeout(() => {
            const el = document.getElementById('input-custom-participants');
            if (el) { el.value = ''; el.focus(); }
        }, 10);
    }
}

function handleSelectChange() {
    const sel = document.getElementById('select-class-add');
    const customArea = document.getElementById('custom-input-area');
    if (!sel || !customArea) return;
    customArea.style.display = sel.value === '__custom__' ? 'flex' : 'none';
}

function getPreviewHtml() {
    const total = state.numGroups * state.qualifiersPerGroup;
    const finalStage = total===8?'8強賽 🏆':total===4?'4強賽 ⚔️':'決賽 👑';
    return `<p class="font-bold text-slate-500 text-lg">
        💡 將選出 <span class="text-sky-600 font-bold text-2xl mx-1">${total}</span> 名出線者，直接進入 <span class="text-sky-600 font-bold text-2xl mx-1">${finalStage}</span>
    </p>`;
}

function render(noAnim=false) {
    updateNav();
    if (state.stage==='setup') {
        appContainer.innerHTML = renderSetup(noAnim);
        document.getElementById('select-num-groups').addEventListener('change', e => {
            state.numGroups = parseInt(e.target.value);
            const allowed = availableQualifiers[state.numGroups];
            if (!allowed.includes(state.qualifiersPerGroup)) state.qualifiersPerGroup = allowed[0];
            render(true);
        });
        document.getElementById('select-qualifiers').addEventListener('change', e => {
            state.qualifiersPerGroup = parseInt(e.target.value);
            render(true);
        });
    } else if (state.stage==='groups') {
        appContainer.innerHTML = renderGroups(noAnim);
        if (state.isRolling) startRollingAnimation();
    } else if (state.stage==='bracket') {
        appContainer.innerHTML = renderBracket(noAnim);
        requestAnimationFrame(() => {
            drawBracketLines(); fitBracket();
            if (state.isBracketRolling) startBracketRollingAnimation();
        });
    }
}

function handleGenerateGroups() {
    const names = [...state.participants];
    const requiredTotal = state.numGroups * state.qualifiersPerGroup;
    if (names.length < requiredTotal) {
        alert(`哎呀 🥺！目前設定需要 ${requiredTotal} 名出線者，但名單只有 ${names.length} 名參賽者，請繼續新增喔！`);
        return;
    }
    const shuffledNames = [...names].sort(()=>Math.random()-0.5);
    state.groups = Array.from({length:state.numGroups}, ()=>[]);
    shuffledNames.forEach((name,i) => state.groups[i%state.numGroups].push(name));
    state.selectedQualifiers = {};
    state.stage = 'groups';
    state.isRolling = true;
    render();
}

            <div>
                <h2 class="text-3xl font-bold text-sky-600 tracking-wide">🍀 幸運小組賽名單</h2>
                <p class="text-blue-400 font-medium mt-2">請點擊名單選擇出線者 👆（每組需選出 ${state.qualifiersPerGroup} 人喔！）</p>
            </div>
            <button data-action="reset" class="px-5 py-2.5 rounded-full font-bold text-slate-400 bg-white border-2 border-slate-200 hover:bg-slate-50 hover:text-sky-500 transition-all shadow-sm flex items-center gap-2">
                🐾 回到設定
            </button>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-10 w-full">
    `;
    state.groups.forEach((group, gIdx) => {
        const selected = state.selectedQualifiers[gIdx]||[];
        const isComplete = selected.length===state.qualifiersPerGroup;
        const cardAnim = noAnim?'':'pop-in';
        const styleStr = noAnim?'':`style="animation-delay:${gIdx*0.05}s;animation-fill-mode:both;"`;
        const headerBg = isComplete&&!state.isRolling?'bg-blue-100 border-blue-200':'bg-sky-50 border-sky-100';
        const titleColor = isComplete&&!state.isRolling?'text-blue-700':'text-sky-600';
        html += `
            <div class="cute-card overflow-hidden flex flex-col ${cardAnim}" ${styleStr}>
                <div class="p-4 border-b-4 ${headerBg} flex items-center justify-between transition-colors">
                    <h3 class="font-bold text-xl ${titleColor}">第 ${gIdx+1} 組 🎪</h3>
                    <span class="text-sm font-bold ${isComplete&&!state.isRolling?'text-blue-700':'text-slate-400'} bg-white px-3 py-1 rounded-full shadow-sm border-2 border-white">
                        ${selected.length} / ${state.qualifiersPerGroup}
                    </span>
                </div>
                <div class="p-4 flex-1 bg-white/50"><ul class="space-y-3">
        `;
        group.forEach(player => {
            const isSelected = selected.includes(player);
            const isDisabled = state.isRolling || (!isSelected && selected.length>=state.qualifiersPerGroup);
            let itemClass = "player-item w-full text-left px-4 py-3 rounded-2xl font-bold flex items-center justify-between text-base ";
            if (state.isRolling) itemClass += "bg-white text-slate-400 border-2 border-slate-100 shadow-sm opacity-80 cursor-wait";
            else if (isSelected) itemClass += "selected";
            else if (isDisabled) itemClass += "disabled bg-slate-50 text-slate-400 border-2 border-transparent";
            else itemClass += "bg-white text-slate-600 shadow-sm border-2 border-sky-50";
            const content = state.isRolling
                ? `<span class="truncate pr-2 rolling-name" data-final-name="${player}">🎲 隨機抽取中...</span>`
                : `<span class="truncate pr-2">${isSelected?'💙':'👤'} ${player}</span>${isSelected?'<span class="text-sky-500 text-xl">✨</span>':''}`;
            html += `<li><button data-action="toggle-qualifier" data-gidx="${gIdx}" data-name="${player}" class="${itemClass}" ${isDisabled?'disabled':''}>${content}</button></li>`;
        });
        html += `</ul></div></div>`;
    });
    const btnAnim = noAnim?'':'pop-in';
    const btnStyle = noAnim?'':`style="animation-delay:0.4s;animation-fill-mode:both;"`;
    html += `
        </div>
        <div class="flex justify-center pb-6 w-full ${btnAnim}" ${btnStyle}>
            <button data-action="generate-bracket" class="py-4 px-12 text-xl flex items-center space-x-3 ${isAllSelected?'cute-btn':'cute-btn cute-btn-disabled'}">
                <span>⚔️ 產生淘汰賽晉級圖！ 🚀</span>
            </button>
        </div>
    `;
    return html;
}

function startRollingAnimation() {
    const namesPool = [...state.participants];
    const rollers = Array.from(document.querySelectorAll('.rolling-name'));
    let activeRollers = [...rollers];
    const intervalId = setInterval(() => {
        activeRollers.forEach(el => { el.innerText = '🎲 ' + namesPool[Math.floor(Math.random()*namesPool.length)]; });
    }, 40);
    rollers.forEach((el,index) => {
        setTimeout(() => {
            activeRollers = activeRollers.filter(r=>r!==el);
            el.innerText = '👤 ' + el.dataset.finalName;
            el.classList.remove('rolling-name');
            if (activeRollers.length===0) { clearInterval(intervalId); state.isRolling=false; render(true); }
        }, 400+(index*80));
    });
}

function toggleQualifier(gIdx, name) {
    const currentSelected = state.selectedQualifiers[gIdx]||[];
    if (currentSelected.includes(name)) state.selectedQualifiers[gIdx] = currentSelected.filter(n=>n!==name);
    else if (currentSelected.length < state.qualifiersPerGroup) state.selectedQualifiers[gIdx] = [...currentSelected, name];
    render(true);
}

function handleGenerateBracket() {
    for (let i=0; i<state.numGroups; i++) {
        if ((state.selectedQualifiers[i]||[]).length!==state.qualifiersPerGroup) {
            alert(`請確認第 ${i+1} 組已經選出 ${state.qualifiersPerGroup} 位喔！ 🥺`); return;
        }
    }
    const allQualifiers = Object.values(state.selectedQualifiers).flat();
    const shuffled = [...allQualifiers].sort(()=>Math.random()-0.5);
    const newRounds = [];
    const firstRound = [];
    for (let i=0; i<shuffled.length; i+=2) firstRound.push({id:`r0-m${i/2}`,p1:shuffled[i],p2:shuffled[i+1],winner:null});
    newRounds.push(firstRound);
    let currentMatchesCount = firstRound.length, roundIndex = 1;
    while (currentMatchesCount>1) {
        currentMatchesCount /= 2;
        const round = [];
        for (let i=0; i<currentMatchesCount; i++) round.push({id:`r${roundIndex}-m${i}`,p1:null,p2:null,winner:null});
        newRounds.push(round); roundIndex++;
    }
    state.bracketRounds = newRounds;
    state.champion = null; state.stage = 'bracket'; state.bracketScale = 1; state.isBracketRolling = true;
    render();
}

/* =========================================================
   階段 3: 淘汰賽
========================================================= */
function getRoundName(totalRounds, idx) {
    const left = totalRounds - idx;
    if (left===1) return "🔥 最終決賽 🔥";
    if (left===2) return "⚔️ 準決賽";
    if (left===3) return "🛡️ 半準決賽";
    return `第 ${idx+1} 輪`;
}

function triggerConfetti() {
    var dur = 3000, end = Date.now()+dur, def={startVelocity:30,spread:360,ticks:60,zIndex:100};
    var iv = setInterval(()=>{
        var tl = end-Date.now(); if(tl<=0) return clearInterval(iv);
        var pc = 50*(tl/dur);
        confetti({...def,particleCount:pc,origin:{x:Math.random()*0.2+0.1,y:Math.random()-0.2},colors:['#0ea5e9','#3b82f6','#bae6fd','#fef08a']});
        confetti({...def,particleCount:pc,origin:{x:Math.random()*0.2+0.7,y:Math.random()-0.2},colors:['#0ea5e9','#3b82f6','#bae6fd','#fef08a']});
    }, 250);
}

function renderBracket(noAnim) {
    const cc = noAnim?'':'pop-in';
    const totalRounds = state.bracketRounds.length;
    const finalRIdx = totalRounds-1;
    const isChamp = state.champion!==null;

    const renderMatchCard = (rIdx, mIdx) => {
        const m = state.bracketRounds[rIdx][mIdx];
        const p1c = !m.p1?"empty":(m.winner===m.p1?"winner":(m.winner?"loser":""));
        const p2c = !m.p2?"empty":(m.winner===m.p2?"winner":(m.winner?"loser":""));
        let p1t, p2t;
        if (state.isBracketRolling && rIdx===0) {
            p1t=`<span class="truncate font-bold bracket-rolling-name" data-final-name="${m.p1||''}">🎲 隨機抽取中...</span>`;
            p2t=`<span class="truncate font-bold bracket-rolling-name" data-final-name="${m.p2||''}">🎲 隨機抽取中...</span>`;
        } else {
            const t1=m.p1?'👤 '+m.p1:'<span class="text-slate-300 text-xl font-normal tracking-widest">等待晉級</span>';
            const t2=m.p2?'👤 '+m.p2:'<span class="text-slate-300 text-xl font-normal tracking-widest">等待晉級</span>';
            p1t=`<span class="truncate font-bold">${t1}</span><span class="text-sky-500 text-4xl ml-2 transition-opacity duration-200 ${m.winner===m.p1&&m.p1?'opacity-100':'opacity-0'}">✨</span>`;
            p2t=`<span class="truncate font-bold">${t2}</span><span class="text-sky-500 text-4xl ml-2 transition-opacity duration-200 ${m.winner===m.p2&&m.p2?'opacity-100':'opacity-0'}">✨</span>`;
        }
        return `<div class="match-card relative w-72 sm:w-80 z-10 shrink-0" id="match-${rIdx}-${mIdx}">
            <div data-action="set-winner" data-ridx="${rIdx}" data-midx="${mIdx}" data-player="1" class="match-player p-6 border-b-4 border-slate-50 flex items-center justify-between rounded-t-[20px] text-2xl sm:text-3xl ${p1c} ${!m.p1?'bg-slate-50 text-slate-400':''}">${p1t}</div>
            <div data-action="set-winner" data-ridx="${rIdx}" data-midx="${mIdx}" data-player="2" class="match-player p-6 flex items-center justify-between rounded-b-[20px] text-2xl sm:text-3xl ${p2c} ${!m.p2?'bg-slate-50 text-slate-400':''}">${p2t}</div>
        </div>`;
    };

    let html = `<div class="flex flex-col h-full w-full flex-1 ${cc}">
        <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-4 shrink-0">
            <div>
                <h2 class="text-3xl font-bold text-sky-600 tracking-wide">👑 最終決戰賽程圖</h2>
                <p class="text-blue-400 font-medium mt-2 text-sm">點擊卡片中的勝出者使其晉級 💙</p>
            </div>
            <button data-action="reset" class="px-5 py-2 mt-2 sm:mt-0 rounded-full font-bold text-slate-400 bg-white border-2 border-slate-200 hover:bg-slate-50 hover:text-sky-500 transition-all shadow-sm text-sm flex items-center gap-2">🐾 重新開始</button>
        </div>
        <div id="bracket-viewport" class="flex-1 w-full bg-white/60 backdrop-blur-sm border-4 border-white rounded-[2rem] shadow-sm flex items-center justify-center overflow-hidden relative p-4 min-h-[600px]">
            <div id="bracket-scale-wrapper" class="origin-center" style="transform:scale(${state.bracketScale});">
                <div id="bracket-container" class="relative inline-flex items-center justify-center p-8 gap-12 sm:gap-20 min-w-max">
                    <svg id="bracket-svg" class="absolute top-0 left-0 pointer-events-none z-0"></svg>`;

    html += `<div class="flex items-stretch gap-12 sm:gap-20">`;
    for (let r=0; r<finalRIdx; r++) {
        html += `<div class="round-col flex flex-col justify-around relative gap-10">
            <div class="absolute -top-16 w-full text-center z-20">
                <span class="text-xl sm:text-2xl font-bold text-blue-600 bg-white border-[3px] border-blue-200 px-6 py-2 rounded-full shadow-sm whitespace-nowrap">${getRoundName(totalRounds,r)}</span>
            </div>`;
        const mc = state.bracketRounds[r].length;
        for (let m=0; m<mc/2; m++) html += renderMatchCard(r,m);
        html += `</div>`;
    }
    html += `</div>`;

    const champBox = isChamp?'champion-crowned border-4':'bg-white border-4 border-sky-100 shadow-sm opacity-90';
    const champTxt = isChamp?'champion-crowned-text text-5xl sm:text-6xl':'text-slate-400 text-4xl sm:text-5xl';
    const champIcon = isChamp?'champion-crowned-icon text-8xl sm:text-9xl':'text-7xl sm:text-8xl';
    const fm = state.bracketRounds[finalRIdx][0];
    const fp1c = !fm.p1?"empty":(fm.winner===fm.p1?"winner":(fm.winner?"loser":""));
    const fp2c = !fm.p2?"empty":(fm.winner===fm.p2?"winner":(fm.winner?"loser":""));
    let fp1t, fp2t;
    if (state.isBracketRolling && finalRIdx===0) {
        fp1t=`<span class="truncate font-bold bracket-rolling-name" data-final-name="${fm.p1||''}">🎲 隨機抽取中...</span>`;
        fp2t=`<span class="truncate font-bold bracket-rolling-name" data-final-name="${fm.p2||''}">🎲 隨機抽取中...</span>`;
    } else {
        const t1=fm.p1?'👤 '+fm.p1:'<span class="text-slate-300 text-2xl font-normal tracking-widest">等待晉級</span>';
        const t2=fm.p2?'👤 '+fm.p2:'<span class="text-slate-300 text-2xl font-normal tracking-widest">等待晉級</span>';
        fp1t=`<span class="truncate font-bold">${t1}</span><span class="text-sky-500 text-5xl ml-2 transition-opacity duration-200 ${fm.winner===fm.p1&&fm.p1?'opacity-100':'opacity-0'}">✨</span>`;
        fp2t=`<span class="truncate font-bold">${t2}</span><span class="text-sky-500 text-5xl ml-2 transition-opacity duration-200 ${fm.winner===fm.p2&&fm.p2?'opacity-100':'opacity-0'}">✨</span>`;
    }

    html += `<div class="flex flex-col justify-center items-center gap-12 relative z-10 shrink-0 px-8" id="champion-col">
        <div class="absolute -top-16 w-full text-center z-20">
            <span class="text-2xl sm:text-3xl font-bold text-blue-600 bg-blue-50 border-[3px] border-blue-200 px-8 py-3 rounded-full shadow-sm whitespace-nowrap">${getRoundName(totalRounds,finalRIdx)}</span>
        </div>
        <div class="match-card relative w-80 sm:w-96 z-10 shrink-0 border-4 border-sky-300 shadow-lg rounded-[24px] overflow-hidden" id="final-p1-card">
            <div data-action="set-winner" data-ridx="${finalRIdx}" data-midx="0" data-player="1" class="match-player p-8 flex items-center justify-between text-3xl sm:text-4xl ${fp1c} ${!fm.p1?'bg-slate-50 text-slate-400':''}">${fp1t}</div>
        </div>
        <div id="champion-box" class="p-10 rounded-[32px] text-center transition-all duration-500 w-80 sm:w-96 relative ${champBox}">
            <div class="mb-4 ${champIcon}">🏆</div>
            <div class="text-xl sm:text-2xl text-sky-400 font-bold mb-3 tracking-widest uppercase">✨ Grand Champion ✨</div>
            <h3 class="font-black truncate ${champTxt}">${state.champion?'👑 '+state.champion:'<span class="text-slate-300 text-3xl font-normal tracking-widest">等待晉級</span>'}</h3>
        </div>
        <div class="match-card relative w-80 sm:w-96 z-10 shrink-0 border-4 border-sky-300 shadow-lg rounded-[24px] overflow-hidden" id="final-p2-card">
            <div data-action="set-winner" data-ridx="${finalRIdx}" data-midx="0" data-player="2" class="match-player p-8 flex items-center justify-between text-3xl sm:text-4xl ${fp2c} ${!fm.p2?'bg-slate-50 text-slate-400':''}">${fp2t}</div>
        </div>
    </div>`;

    html += `<div class="flex items-stretch gap-12 sm:gap-20">`;
    for (let r=finalRIdx-1; r>=0; r--) {
        html += `<div class="round-col flex flex-col justify-around relative gap-10">
            <div class="absolute -top-16 w-full text-center z-20">
                <span class="text-xl sm:text-2xl font-bold text-blue-600 bg-white border-[3px] border-blue-200 px-6 py-2 rounded-full shadow-sm whitespace-nowrap">${getRoundName(totalRounds,r)}</span>
            </div>`;
        const mc = state.bracketRounds[r].length;
        for (let m=mc/2; m<mc; m++) html += renderMatchCard(r,m);
        html += `</div>`;
    }
    html += `</div></div></div></div></div>`;
    return html;
}

function startBracketRollingAnimation() {
    const pool = Object.values(state.selectedQualifiers).flat();
    const rollers = Array.from(document.querySelectorAll('.bracket-rolling-name'));
    let active = [...rollers];
    const iv = setInterval(() => { active.forEach(el=>{el.innerText='🎲 '+pool[Math.floor(Math.random()*pool.length)];}); }, 40);
    rollers.forEach((el,index) => {
        setTimeout(() => {
            active = active.filter(r=>r!==el);
            const fn = el.dataset.finalName;
            el.innerHTML = fn ? '👤 '+fn : '<span class="text-slate-300 text-xl font-normal tracking-widest">等待晉級</span>';
            el.classList.remove('bracket-rolling-name');
            if (active.length===0) { clearInterval(iv); state.isBracketRolling=false; render(true); }
        }, 600+(index*150));
    });
}

function handleMatchWinnerClick(rIdx, mIdx, playerNum) {
    const match = state.bracketRounds[rIdx][mIdx];
    const winner = playerNum===1 ? match.p1 : match.p2;
    if (!winner) return;
    match.winner = (match.winner===winner) ? null : winner;
    let crIdx=rIdx, cmIdx=mIdx;
    while (crIdx<state.bracketRounds.length-1) {
        const nextMIdx = Math.floor(cmIdx/2);
        const isP1 = cmIdx%2===0;
        const nextMatch = state.bracketRounds[crIdx+1][nextMIdx];
        if (isP1) nextMatch.p1 = state.bracketRounds[crIdx][cmIdx].winner;
        else nextMatch.p2 = state.bracketRounds[crIdx][cmIdx].winner;
        if (nextMatch.winner!==nextMatch.p1 && nextMatch.winner!==nextMatch.p2) nextMatch.winner=null;
        crIdx++; cmIdx=nextMIdx;
    }
    const prev = state.champion;
    state.champion = state.bracketRounds[state.bracketRounds.length-1][0].winner;
    if (state.champion && state.champion!==prev) triggerConfetti();
    render(true);
}

function drawBracketLines() {
    const svg = document.getElementById('bracket-svg');
    const container = document.getElementById('bracket-container');
    if (!svg||!container) return;
    svg.setAttribute('width', container.offsetWidth);
    svg.setAttribute('height', container.offsetHeight);
    svg.innerHTML = '';
    const getC = (el) => {
        let l=0,t=0,c=el;
        while (c&&c!==container) { l+=c.offsetLeft; t+=c.offsetTop; c=c.offsetParent; }
        return {left:l,right:l+el.offsetWidth,top:t,bottom:t+el.offsetHeight,centerY:t+el.offsetHeight/2,centerX:l+el.offsetWidth/2};
    };
    const stroke = "#bae6fd", sw = "8", br = 20;
    const finalRIdx = state.bracketRounds.length-1;
    for (let r=0; r<finalRIdx; r++) {
        for (let m=0; m<state.bracketRounds[r].length; m++) {
            const c1e = document.getElementById(`match-${r}-${m}`);
            let c2e;
            if (r+1===finalRIdx) c2e = m===0 ? document.getElementById('final-p1-card') : document.getElementById('final-p2-card');
            else c2e = document.getElementById(`match-${r+1}-${Math.floor(m/2)}`);
            if (!c1e||!c2e) continue;
            const c1=getC(c1e), c2=getC(c2e);
            let sx,sy,ex,ey;
            if (c1.centerX<c2.centerX) { sx=c1.right;sy=c1.centerY;ex=c2.left;ey=c2.centerY; }
            else { sx=c1.left;sy=c1.centerY;ex=c2.right;ey=c2.centerY; }
            const mx=sx+(ex-sx)/2, dir=sx<ex?1:-1, rx=br*dir;
            const path = document.createElementNS("http://www.w3.org/2000/svg","path");
            let d=`M ${sx} ${sy} `;
            if (Math.abs(ex-sx)<br*2) d+=`L ${ex} ${ey}`;
            else {
                d+=`L ${mx-rx} ${sy} `;
                if (ey>sy+br) d+=`Q ${mx} ${sy} ${mx} ${sy+br} L ${mx} ${ey-br} Q ${mx} ${ey} ${mx+rx} ${ey} `;
                else if (ey<sy-br) d+=`Q ${mx} ${sy} ${mx} ${sy-br} L ${mx} ${ey+br} Q ${mx} ${ey} ${mx+rx} ${ey} `;
                else d=`M ${sx} ${sy} L ${mx} ${sy} L ${ex} ${ey}`;
            }
            d+=`L ${ex} ${ey}`;
            path.setAttribute("d",d); path.setAttribute("fill","transparent");
            path.setAttribute("stroke",stroke); path.setAttribute("stroke-width",sw);
            path.setAttribute("stroke-linejoin","round"); path.setAttribute("stroke-linecap","round");
            svg.appendChild(path);
        }
    }
    const fm=state.bracketRounds[finalRIdx][0];
    const cb_el=document.getElementById('champion-box');
    const fp1=document.getElementById('final-p1-card');
    const fp2=document.getElementById('final-p2-card');
    if (cb_el) {
        const cb=getC(cb_el);
        if (fp1) {
            const c=getC(fp1), win=state.champion===fm.p1&&state.champion;
            const p=document.createElementNS("http://www.w3.org/2000/svg","path");
            p.setAttribute("d",`M ${c.centerX} ${c.bottom} L ${cb.centerX} ${cb.top}`);
            p.setAttribute("fill","transparent"); p.setAttribute("stroke",win?"#fcd34d":"#bae6fd");
            p.setAttribute("stroke-width",win?"12":"8"); p.setAttribute("stroke-dasharray",win?"none":"10 10");
            p.setAttribute("stroke-linecap","round"); svg.appendChild(p);
        }
        if (fp2) {
            const c=getC(fp2), win=state.champion===fm.p2&&state.champion;
            const p=document.createElementNS("http://www.w3.org/2000/svg","path");
            p.setAttribute("d",`M ${c.centerX} ${c.top} L ${cb.centerX} ${cb.bottom}`);
            p.setAttribute("fill","transparent"); p.setAttribute("stroke",win?"#fcd34d":"#bae6fd");
            p.setAttribute("stroke-width",win?"12":"8"); p.setAttribute("stroke-dasharray",win?"none":"10 10");
            p.setAttribute("stroke-linecap","round"); svg.appendChild(p);
        }
    }
}

function fitBracket() {
    const vp=document.getElementById('bracket-viewport');
    const wr=document.getElementById('bracket-scale-wrapper');
    const ct=document.getElementById('bracket-container');
    if (!vp||!wr||!ct) return;
    const scale = Math.min((vp.clientWidth*0.95)/ct.offsetWidth, (vp.clientHeight*0.95)/ct.offsetHeight, 2.5);
    state.bracketScale = scale;
    wr.style.transform = `scale(${scale})`;
}

function resetApp() {
    if (state.stage!=='setup' && window.confirm("確定要回到設定頁面嗎？所有晉級進度將會重置喔！ 🌊 (但名單會為您保留)")) {
        state.stage='setup'; state.champion=null; state.isRolling=false; state.isBracketRolling=false;
        render();
    }
}

init();
</script>
</body>
</html>
